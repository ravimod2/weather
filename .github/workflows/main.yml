  #   needs: test
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4

  #     - name: Install Claude Code CLI
  #       run: |
  #         curl -sL claude.ai/install.sh | bash
  #         echo "$HOME/.local/bin" >> "$GITHUB_PATH"

  #     - name: Claude Code Vibe Check
  #       env:
  #         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  #       run: |
  #         claude -p "Review the UI components in this repo. Check that the weather
  #         dashboard has no obvious layout issues and follows CLAUDE.md standards.
  #         Output PASS or FAIL with reasons." --output-format json
  deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: test
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Deploy to Vercel
          run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}